<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHW281 — Data Warehousing Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;color:#1E293B;min-height:100vh}
button{font-family:inherit}

/* HEADER */
.hdr{background:#1A2B4A;color:#fff}
.hdr-inner{max-width:680px;margin:0 auto;padding:22px 20px 16px}
.hdr-eye{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#93C5FD;margin-bottom:4px}
.hdr h1{font-size:22px;font-weight:700;margin-bottom:2px}
.hdr-sub{font-size:12px;color:#94A3B8}
.prog-track{background:rgba(255,255,255,.1);height:4px}
.prog-fill{height:4px;background:#3B82F6;transition:width .4s}
.stats-bar{border-top:1px solid rgba(255,255,255,.08)}
.stats-inner{max-width:680px;margin:0 auto;padding:10px 20px;display:flex;gap:20px;flex-wrap:wrap}
.stat{font-size:12px;color:#94A3B8;display:flex;align-items:center;gap:6px}
.stat b{font-weight:600;color:#E2E8F0}
.dot{width:7px;height:7px;border-radius:50%}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:28px 20px 60px}

/* HOME */
.home-title{font-size:18px;font-weight:700;color:#1A2B4A;margin-bottom:4px}
.home-sub{font-size:13px;color:#64748B;margin-bottom:24px}
.sec-cards{display:flex;flex-direction:column;gap:14px}
.sec-card{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:14px;border:1.5px solid #CBD5E1;background:#fff;cursor:pointer;text-align:left;width:100%;transition:border-color .15s,box-shadow .15s}
.sec-card:hover{box-shadow:0 2px 14px rgba(37,99,235,.1)}
.sc-icon{width:48px;height:48px;border-radius:12px;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-body{flex:1;min-width:0}
.sc-title{font-size:15px;font-weight:700;color:#1A2B4A;margin-bottom:2px}
.sc-desc{font-size:12px;color:#64748B;margin-bottom:8px}
.sc-bar-track{background:#E2E8F0;border-radius:4px;height:5px;overflow:hidden}
.sc-bar-fill{height:5px;border-radius:4px;transition:width .4s}
.sc-label{font-size:11px;color:#64748B;margin-top:4px}
.sc-arrow{font-size:20px;color:#94A3B8;flex-shrink:0}
.reset-wrap{text-align:center;margin-top:28px}
.btn-reset{padding:9px 22px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#94A3B8;cursor:pointer}
.btn-reset:hover{border-color:#DC2626;color:#DC2626}

/* QUIZ NAV */
.quiz-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.btn-back{padding:7px 14px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#64748B;cursor:pointer}
.btn-back:hover{border-color:#1A2B4A;color:#1A2B4A}
.qnav-title{font-size:15px;font-weight:700;color:#1A2B4A}
.qnav-count{margin-left:auto;font-size:13px;color:#64748B}
.qprog-track{background:#E2E8F0;border-radius:4px;height:4px;margin-bottom:20px;overflow:hidden}
.qprog-fill{height:4px;border-radius:4px;transition:width .3s}

/* QUESTION CARD */
.q-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:14px;padding:24px 22px}
.q-card.correct{background:#F0FDF4;border-color:#86EFAC}
.q-card.wrong{background:#FEF2F2;border-color:#FCA5A5}
.q-card.partial{background:#FFFBEB;border-color:#FCD34D}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:20px;color:#1E293B}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid #CBD5E1;border-radius:10px;background:#F8FAFC;cursor:pointer;text-align:left;font-size:14px;color:#1E293B;width:100%;transition:border-color .12s,background .12s}
.opt-btn:not(:disabled):hover{border-color:#3B82F6;background:#EEF4FF}
.opt-letter{width:26px;height:26px;min-width:26px;border-radius:50%;background:#CBD5E1;color:#64748B;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.opt-btn:not(:disabled):hover .opt-letter{background:#3B82F6;color:#fff}
.opt-btn.selected{border-color:#2563EB;background:#EEF4FF}
.opt-btn.selected .opt-letter{background:#2563EB;color:#fff}
.opt-btn.opt-correct{border-color:#16A34A;background:#F0FDF4}
.opt-btn.opt-correct .opt-letter{background:#16A34A;color:#fff}
.opt-btn.opt-wrong{border-color:#DC2626;background:#FEF2F2}
.opt-btn.opt-wrong .opt-letter{background:#DC2626;color:#fff}

/* TF */
.tf-row{display:flex;gap:10px}
.tf-btn{flex:1;padding:13px;border:1.5px solid #CBD5E1;border-radius:10px;background:#F8FAFC;cursor:pointer;font-size:14px;font-weight:600;color:#1E293B;transition:all .12s}
.tf-btn:not(:disabled):hover{border-color:#3B82F6;background:#EEF4FF;color:#2563EB}
.tf-btn.selected{border-color:#2563EB;background:#EEF4FF;color:#2563EB}
.tf-btn.tf-correct{border-color:#16A34A;background:#F0FDF4;color:#16A34A}
.tf-btn.tf-wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626}

/* DRAG & DROP */
.dd-area{display:flex;gap:16px;flex-wrap:wrap}
.dd-bank-wrap{flex:1 1 160px;min-width:160px}
.dd-bank-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:8px}
.dd-bank{min-height:40px;padding:4px;border-radius:8px;border:1.5px dashed #CBD5E1;display:flex;flex-direction:column;gap:6px;transition:background .15s,border-color .15s}
.dd-bank.dragover{background:#EEF4FF;border-color:#3B82F6}
.dd-zones{flex:2 1 240px;display:flex;flex-direction:column;gap:8px}
.dd-zone{border:1.5px dashed #CBD5E1;border-radius:8px;padding:8px 10px;min-height:48px;transition:background .15s,border-color .15s}
.dd-zone.dragover{background:#EEF4FF;border-color:#3B82F6}
.dd-zone-label{font-size:12px;font-weight:600;color:#1A2B4A;margin-bottom:4px;pointer-events:none}
.dd-items{display:flex;flex-direction:column;gap:4px}
.dd-item{padding:7px 11px;border-radius:7px;font-size:13px;background:#fff;border:1.5px solid #CBD5E1;color:#1E293B;cursor:grab;user-select:none;transition:opacity .15s}
.dd-item.dragging{opacity:.35}
.dd-item.item-correct{border-color:#16A34A;background:#F0FDF4;color:#16A34A;cursor:default}
.dd-item.item-wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626;cursor:default}

/* FEEDBACK */
.feedback{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.5}
.feedback.correct{background:#F0FDF4;border:1px solid #86EFAC;color:#14532D}
.feedback.wrong{background:#FEF2F2;border:1px solid #FCA5A5;color:#7F1D1D}
.feedback.partial{background:#FFFBEB;border:1px solid #FCD34D;color:#78350F}

/* FOOTER BUTTONS */
.q-footer{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.btn-check{padding:10px 22px;background:#1A2B4A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-check:disabled{background:#CBD5E1;color:#94A3B8;cursor:default}
.btn-next{padding:10px 22px;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* QUIZ NAV ROW (prev/results) */
.nav-row{display:flex;justify-content:space-between;margin-top:14px}
.btn-prev{padding:8px 16px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#64748B;cursor:pointer}
.btn-prev:disabled{color:#CBD5E1;cursor:default}
.btn-results{padding:8px 20px;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

/* SECTION COMPLETE */
.complete-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:14px;padding:40px 28px;text-align:center}
.score-ring{width:100px;height:100px;border-radius:50%;background:#EEF4FF;border:4px solid #2563EB;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
.score-num{font-size:28px;font-weight:700;color:#1A2B4A}
.score-pct{font-size:12px;color:#64748B}
.complete-title{font-size:20px;font-weight:700;color:#1A2B4A;margin-bottom:6px}
.complete-sub{font-size:14px;color:#64748B;margin-bottom:28px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.stat-box{background:#F8FAFC;border-radius:10px;padding:14px}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:12px;color:#64748B;margin-top:2px}
.complete-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-retry{padding:11px 22px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:#64748B}
.btn-home{padding:11px 22px;background:#1A2B4A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* VIEWS */
#quizView{display:none}

@media(max-width:560px){
  .dd-area{flex-direction:column}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stats-inner{gap:12px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-eye">EXAM PREPARATION</div>
    <h1>Data Warehousing 281</h1>
    <div class="hdr-sub">100 questions &nbsp;·&nbsp; Multiple choice, True/False, Drag &amp; Drop</div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progBar" style="width:0%"></div></div>
  <div class="stats-bar">
    <div class="stats-inner">
      <div class="stat"><div class="dot" style="background:#4ADE80"></div>Correct: <b id="sCorrect">0</b></div>
      <div class="stat"><div class="dot" style="background:#F87171"></div>Wrong: <b id="sWrong">0</b></div>
      <div class="stat"><div class="dot" style="background:#94A3B8"></div>Remaining: <b id="sRemain">100</b></div>
      <div class="stat">Score: <b id="sScore">0%</b></div>
    </div>
  </div>
</div>

<div class="main">
  <!-- HOME -->
  <div id="homeView">
    <div class="home-title">Choose a section</div>
    <div class="home-sub">Progress saves automatically — pick up where you left off.</div>
    <div class="sec-cards" id="secCards"></div>
    <div class="reset-wrap">
      <button class="btn-reset" onclick="resetAll()">↺ Reset all progress</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quizView">
    <div class="quiz-nav">
      <button class="btn-back" onclick="goHome()">← Back</button>
      <div class="qnav-title" id="qnavTitle"></div>
      <div class="qnav-count" id="qnavCount"></div>
    </div>
    <div class="qprog-track"><div class="qprog-fill" id="qprogFill" style="width:0%"></div></div>
    <div id="questionArea"></div>
    <div class="nav-row">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">← Previous</button>
      <button class="btn-results" id="btnResults" style="display:none" onclick="showComplete()">See results →</button>
    </div>
  </div>
</div>



<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const Q = [
  // MC 1-60
  {t:'mc',q:'What is the primary purpose of a data warehouse?',o:['To process day-to-day transactions','To support strategic analysis and decision-making','To store employee payroll data','To manage inventory in real time'],a:1,e:'Data warehouses are informational systems designed for strategic analysis, not daily transaction processing.'},
  {t:'mc',q:'Which term describes the inability of organisations to access strategic information despite having large amounts of operational data?',o:['Data overload','Information crisis','Storage bottleneck','Query latency'],a:1,e:'The "information crisis" describes having lots of data but lacking the ability to derive strategic insights from it.'},
  {t:'mc',q:'Which characteristic of strategic information means that every business factor has ONE and only one value across the enterprise?',o:['Integrated','Accessible','Credible','Timely'],a:2,e:'Credibility ensures a single consistent value for every business factor enterprise-wide.'},
  {t:'mc',q:'Which of the following is an example of an OPERATIONAL system?',o:['Executive dashboard','Customer loyalty analytics','Order processing system','Market trend analysis tool'],a:2,e:'Order processing is a routine operational transaction system, not an analytical one.'},
  {t:'mc',q:'What does "Time Variant" mean in the context of a data warehouse?',o:['Data expires after 30 days','The warehouse includes both current and historical data','Queries must be run during business hours','Data is updated every minute'],a:1,e:'Time variant means the warehouse stores data across time periods — both current and historical.'},
  {t:'mc',q:'Ralph Kimball recommends implementing a data warehouse as:',o:['One large enterprise-wide system built top-down','A series of carefully architected Supermarts, one at a time','A single flat file extracted from the mainframe','Independent data marts with no shared dimensions'],a:1,e:"Kimball's bottom-up approach implements the warehouse as a series of Supermarts (coordinated data marts)."},
  {t:'mc',q:'Which of these best describes a "dependent data mart"?',o:['A mart that operates independently with its own ETL','A mart sourced directly from the central data warehouse','A mart used only by the marketing department','A mart that does not use dimensional modeling'],a:1,e:'Dependent data marts derive their data from the central warehouse, ensuring consistency.'},
  {t:'mc',q:"What is the first step in Ralph Kimball's four-step implementation approach?",o:['Conform and standardise all data','Build the ETL pipeline','Plan and define requirements at the corporate level','Implement the first data mart'],a:2,e:"Kimball's first step is planning and defining requirements at the overall corporate level."},
  {t:'mc',q:'Which industry uses data warehousing primarily for route profitability and yield management?',o:['Retail','Financial','Airlines','Manufacturing'],a:2,e:'Airlines use data warehousing to analyse route profitability and optimise yield management.'},
  {t:'mc',q:'What does ETL stand for?',o:['Enter, Test, Launch','Extract, Transform, Load','Evaluate, Track, Log','Export, Transfer, Link'],a:1,e:'ETL = Extract (pull from sources), Transform (cleanse/standardise), Load (insert into the warehouse).'},
  {t:'mc',q:'Which user tier typically uses Executive Information Systems (EIS)?',o:['Junior analysts','Database administrators','Senior executives and managers','IT support staff'],a:2,e:'EIS provides high-level strategic information specifically for senior executives and managers.'},
  {t:'mc',q:'Which schema type uses a central fact table surrounded by NON-normalised dimension tables?',o:['Snowflake schema','Galaxy schema','Star schema','Flat schema'],a:2,e:'The star schema has a central fact table surrounded by denormalised dimension tables — simple and fast.'},
  {t:'mc',q:'In the Snowflake schema, dimension tables are:',o:['Denormalised into one flat table','Normalised into multiple related tables','Replaced by fact tables','Stored in a separate database'],a:1,e:'Snowflake extends the star by normalising (splitting out) dimension tables into multiple related tables.'},
  {t:'mc',q:'What is stored in a FACT table?',o:['Descriptive attributes like product name','Measurable, quantitative metrics','Employee contact details','System configuration settings'],a:1,e:'Fact tables store quantitative measures — e.g., sales amount, quantity sold, revenue.'},
  {t:'mc',q:'What is stored in a DIMENSION table?',o:['Financial totals and KPIs','Aggregated monthly summaries','Descriptive context such as product, date, or customer','Raw transaction logs'],a:2,e:'Dimension tables hold the descriptive attributes (context) used to slice and filter facts.'},
  {t:'mc',q:'A "conformed dimension" is one that is:',o:['Specific to a single data mart','Shared and identically defined across multiple data marts','Updated in real time from operational systems','Encrypted for security compliance'],a:1,e:'Conformed dimensions are standardised and shared across multiple data marts, enabling cross-mart analysis.'},
  {t:'mc',q:'Which ETL stage is responsible for cleansing, validating, and standardising data?',o:['Extract','Transform','Load','Index'],a:1,e:'The Transform stage cleanses data, applies business rules, and standardises it before loading.'},
  {t:'mc',q:'Which OLAP delivery method is best suited for novice or casual users?',o:['Data mining','Statistical analysis','Ad hoc reports','Multidimensional analysis'],a:2,e:'Predefined ad hoc reports are designed for novice and casual users who need quick answers.'},
  {t:'mc',q:'What does OLAP stand for?',o:['Online Linear Analysis Processing','Operational Load and Processing','Online Analytical Processing','Organised Large Array Processing'],a:2,e:'OLAP = Online Analytical Processing — technology for fast multidimensional data analysis.'},
  {t:'mc',q:'Which of the following is NOT a feature of a data warehouse?',o:['Read-intensive','Time variant','Real-time continuous updates','Online access'],a:2,e:'Data warehouses are updated periodically in batches, not with real-time continuous updates like operational systems.'},
  {t:'mc',q:'The "back room" of the data warehouse refers to which process?',o:['Report delivery','User authentication','The ETL process','Security management'],a:2,e:'Kimball coined the term "back room" for the ETL process — data preparation behind the scenes.'},
  {t:'mc',q:'Which of the following best describes Business Intelligence (BI)?',o:['Software for automating invoices','Using data to study the past, assess the present, and predict the future','A type of database used for OLTP','A programming language for data analysis'],a:1,e:'BI is the enterprise ability to study history, understand the current situation, and predict/change future outcomes.'},
  {t:'mc',q:'What does "Integrated" mean as a characteristic of strategic information?',o:['The system is connected to the internet','Data provides a single, enterprise-wide view','All databases are linked in real time','IT manages all data access centrally'],a:1,e:'"Integrated" means the warehouse provides a unified, enterprise-wide view of data from all sources.'},
  {t:'mc',q:'In data warehousing, "Accessible" information means:',o:['Data can only be accessed by IT staff','Data is available via encrypted API only','Data is reachable through intuitive paths and responsive to analysis','Data access requires formal request forms'],a:2,e:'"Accessible" means users can reach data through intuitive paths and the system responds quickly to queries.'},
  {t:'mc',q:'Which architecture approach builds a mammoth enterprise-wide warehouse first?',o:['Bottom-up approach','Kimball approach','Top-down approach','Supermart approach'],a:2,e:'Top-down (Inmon) approach builds the central enterprise warehouse first before creating data marts.'},
  {t:'mc',q:'Which retail data warehousing activity focuses on building lasting customer relationships?',o:['Yield management','Customer loyalty programs','Route profitability analysis','Asset management'],a:1,e:'Retail data warehousing focuses on customer loyalty — tracking behaviour and personalising offers.'},
  {t:'mc',q:'Data mining is used primarily to:',o:['Clean data during ETL','Generate predefined monthly reports','Discover hidden patterns in warehouse data','Manage database user permissions'],a:2,e:'Data mining uses specialised algorithms to find hidden patterns and relationships in warehouse data.'},
  {t:'mc',q:'Which characteristic ensures information is available within the required decision timeframe?',o:['Integrated','Credible','Accessible','Timely'],a:3,e:'"Timely" means information is available within the stipulated timeframe needed for making the decision.'},
  {t:'mc',q:'A data warehouse is described as "read-intensive" because:',o:['Users can only read, not write, to any system','It is optimised for querying data rather than frequent updates','All writes require administrator approval','Data is stored in read-only format permanently'],a:1,e:'Warehouses are optimised for SELECT queries (reads/analytics) rather than frequent INSERT/UPDATE operations.'},
  {t:'mc',q:'What is the role of "User Independence" in a data warehouse?',o:['Users manage their own servers','IT no longer exists in the organisation','Users can interact directly with data without needing IT assistance',"Users are isolated from each other's queries"],a:2,e:'User independence means business users can query and explore data directly, without requiring IT to run reports for them.'},
  {t:'mc',q:'Which delivery method would a power user use for complex multi-dimensional queries?',o:['Ad hoc reports','Executive Information Systems','Multidimensional (MD) analysis','Basic table exports'],a:2,e:'Multidimensional analysis is designed for power users and analysts who need to slice data across multiple dimensions.'},
  {t:'mc',q:'The financial services industry uses data warehousing primarily for:',o:['Inventory tracking and logistics','Route profitability and yield management','Risk management and fraud detection','Manpower planning and cost control'],a:2,e:'Financial services warehousing focuses on risk management and detecting fraudulent transactions.'},
  {t:'mc',q:'What does "Data Integrity" mean in the context of data quality?',o:['Data is backed up in multiple locations','All information conforms to established business rules and is accurate','Data is encrypted using AES-256','The database has zero downtime'],a:1,e:'Data integrity means all information conforms to business rules, is accurate, and free from corruption.'},
  {t:'mc',q:"Ralph Kimball's third step in warehouse implementation is:",o:['Plan and define corporate requirements','Implement data marts one at a time','Conform and standardise all data content','Create a surrounding architecture'],a:2,e:'Step 3 is conforming and standardising all data content across the enterprise.'},
  {t:'mc',q:'Manufacturing companies use data warehousing primarily for:',o:['Customer loyalty and market planning','Route profitability analysis','Cost reduction and logistics management','Fraud detection and risk management'],a:2,e:'Manufacturing focuses on cost reduction, supply chain optimisation, and logistics management.'},
  {t:'mc',q:'Which of the following is a key question in deciding between a data warehouse and a data mart?',o:['Which has more storage capacity?','Which should be established first?','Which requires less security?','Which is cheaper to license?'],a:1,e:'A core architectural decision is whether to build the central warehouse or a focused data mart first.'},
  {t:'mc',q:'A Slowly Changing Dimension (SCD) Type 2 strategy:',o:['Overwrites old values with new ones','Creates a new row to preserve the history of changes','Stores old and new values in the same row','Deletes changed records immediately'],a:1,e:'SCD Type 2 creates a new row for each change, preserving the full history of dimension data over time.'},
  {t:'mc',q:'Aggregate tables in a data warehouse are used to:',o:['Store raw transaction logs','Pre-summarise data to speed up common queries','Encrypt sensitive financial data','Archive old data for compliance'],a:1,e:"Aggregate tables store pre-computed summaries so frequent queries don't have to re-scan millions of detail rows."},
  {t:'mc',q:'Government agencies use data warehousing primarily for:',o:['Yield management and route profitability','Customer loyalty and churn prevention','Manpower planning and cost control','Fraud detection and insurance claims'],a:2,e:'Government data warehousing focuses on manpower planning, resource allocation, and cost control.'},
  {t:'mc',q:'A "Family of Stars" in dimensional modeling refers to:',o:['Multiple fact tables with different granularity','Multiple related star schemas sharing conformed dimensions','A set of snowflake schemas in one database','A collection of flat files used for reporting'],a:1,e:'A family of stars is a set of related star schemas that share conformed dimensions, enabling integrated cross-subject analysis.'},
  {t:'mc',q:'Which of the following best describes "web-enabled warehousing"?',o:['Storing warehouse data on public cloud servers','Using web technologies to allow remote online access to warehouse data','Replacing all databases with web-based APIs','Exposing raw SQL to end users via a website'],a:1,e:'Web-enabled warehousing uses web technologies so users can query and report from any remote location.'},
  {t:'mc',q:"In Kimball's approach, what is a \"Supermart\"?",o:['A very large, enterprise-wide data warehouse','A carefully architected data mart built as part of a broader warehouse plan','An independent mart with its own ETL pipeline','A data mart used only by senior management'],a:1,e:"A Supermart is Kimball's term for a carefully designed data mart that is part of an overall enterprise architecture."},
  {t:'mc',q:'Which of these is NOT one of the five characteristics of strategic information?',o:['Integrated','Scalable','Credible','Timely'],a:1,e:'The five characteristics are: Integrated, Data Integrity, Accessible, Credible, and Timely. "Scalable" is not one of them.'},
  {t:'mc',q:'Statistical analysis in a data warehouse is typically performed by:',o:['Casual users reading dashboards','Novice users running predefined reports','Power users performing advanced data processing','Junior staff doing data entry'],a:2,e:'Statistical analysis is an advanced method for power users — it goes beyond simple reports into quantitative techniques.'},
  {t:'mc',q:'In which industry would "asset and resource management" be a primary warehousing goal?',o:['Retail','Airlines','Utilities','Government'],a:2,e:'Utilities companies use data warehousing to manage physical assets (power lines, meters) and optimise resources.'},

const SECTIONS = [
  {id:'mc', icon:'📊', title:'Multiple Choice', desc:'Questions 1–60', color:'#2563EB', start:0,  end:59},
  {id:'tf', icon:'✓✗', title:'True or False',  desc:'Questions 61–80', color:'#7C3AED', start:60, end:79},
  {id:'dd', icon:'⇄',  title:'Drag & Drop',   desc:'Questions 81–100',color:'#0891B2', start:80, end:99},
];

// ═══════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════
const SK = 'dhw181_v3';
let answered = {};
try { answered = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) {}
function save() { try { localStorage.setItem(SK, JSON.stringify(answered)); } catch(e) {} }

// Active quiz state
let activeSec = null;   // section object
let qList = [];         // array of qi indices
let qPos = 0;           // current index into qList
let mcSel = null;
let tfSel = null;
let ddPlacements = {};  // item -> zone
let ddDraggingItem = null;

// ═══════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════
function updateStats() {
  const vals = Object.values(answered);
  const correct = vals.filter(v=>v.correct).length;
  const done = vals.length;
  const wrong = done - correct;
  const pct = done > 0 ? Math.round(correct/done*100) : 0;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = 100 - done;
  document.getElementById('sScore').textContent = pct + '%';
  document.getElementById('progBar').style.width = Math.round(done/100*100) + '%';
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function goHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('quizView').style.display = 'none';
  renderHome();
}

function renderHome() {
  updateStats();
  const container = document.getElementById('secCards');
  container.innerHTML = '';
  SECTIONS.forEach((sec, idx) => {
    const total = sec.end - sec.start + 1;
    let done = 0, correct = 0;
    for (let qi = sec.start; qi <= sec.end; qi++) {
      if (answered[qi] !== undefined) { done++; if (answered[qi].correct) correct++; }
    }
    const pct = Math.round(done/total*100);
    const complete = done === total;
    const inprog = done > 0 && !complete;

    const card = document.createElement('button');
    card.className = 'sec-card';
    card.style.borderColor = complete ? '#86EFAC' : inprog ? sec.color : '#CBD5E1';
    card.style.background = complete ? '#F0FDF4' : inprog ? '#F8FAFF' : '#fff';

    card.innerHTML = `
      <div class="sc-icon" style="background:${complete?'#16A34A':sec.color}">${complete?'✓':sec.icon}</div>
      <div class="sc-body">
        <div class="sc-title">${sec.title}</div>
        <div class="sc-desc">${sec.desc} &nbsp;·&nbsp; ${total} questions</div>
        <div class="sc-bar-track"><div class="sc-bar-fill" style="width:${pct}%;background:${complete?'#16A34A':sec.color}"></div></div>
        <div class="sc-label">${done}/${total} answered${complete?' · Complete ✓':inprog?` · ${correct} correct so far`:''}</div>
      </div>
      <div class="sc-arrow">${complete?'↺':'›'}</div>`;
    card.onclick = () => openSection(idx);
    container.appendChild(card);
  });
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  answered = {};
  save();
  renderHome();
}

// ═══════════════════════════════════════════════
// OPEN SECTION
// ═══════════════════════════════════════════════
function openSection(idx) {
  activeSec = SECTIONS[idx];
  const unanswered = [], ansrd = [];
  for (let qi = activeSec.start; qi <= activeSec.end; qi++) {
    answered[qi] !== undefined ? ansrd.push(qi) : unanswered.push(qi);
  }
  qList = [...unanswered, ...ansrd];
  qPos = 0;
  mcSel = null; tfSel = null; ddPlacements = {};

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('quizView').style.display = 'block';
  document.getElementById('qnavTitle').textContent = activeSec.title;
  document.getElementById('qprogFill').style.background = activeSec.color;
  document.getElementById('btnResults').style.background = activeSec.color;
  document.getElementById('btnNext') && (document.getElementById('btnNext').style.background = activeSec.color);

  renderQ();
}

// ═══════════════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════════════
function renderQ() {
  mcSel = null; tfSel = null; ddPlacements = {};
  updateStats();

  const allDone = qList.every(qi => answered[qi] !== undefined);

  document.getElementById('qnavCount').textContent = (qPos+1) + ' / ' + qList.length;
  document.getElementById('qprogFill').style.width = Math.round(qPos/qList.length*100) + '%';
  document.getElementById('btnPrev').disabled = qPos === 0;
  document.getElementById('btnResults').style.display = allDone ? 'inline-block' : 'none';

  const qi = qList[qPos];
  const q = Q[qi];
  const area = document.getElementById('questionArea');

  if (q.t === 'mc') renderMC(area, q, qi);
  else if (q.t === 'tf') renderTF(area, q, qi);
  else renderDD(area, q, qi);

  window.scrollTo({top:0, behavior:'smooth'});
}

function prevQ() {
  if (qPos > 0) { qPos--; renderQ(); }
}

// ═══════════════════════════════════════════════
// MC
// ═══════════════════════════════════════════════
function renderMC(area, q, qi) {
  const locked = answered[qi] !== undefined;
  const saved = answered[qi];
  const LETTERS = ['A','B','C','D'];

  let optsHtml = '';
  q.o.forEach((opt, j) => {
    let cls = 'opt-btn';
    if (locked) {
      if (j === q.a) cls += ' opt-correct';
      else if (j === (saved && saved.selection) && !saved.correct) cls += ' opt-wrong';
    }
    optsHtml += `<button class="${cls}" id="opt_${qi}_${j}" onclick="selectMC(${qi},${j})" ${locked?'disabled':''}>`
      + `<span class="opt-letter">${LETTERS[j]}</span>${escHtml(opt)}</button>`;
  });

  area.innerHTML = `
    <div class="q-card${locked?(saved.correct?' correct':' wrong'):''}" id="qcard_${qi}">
      <div class="q-num" style="color:${activeSec.color}">Q${qi+1} of ${Q.length}</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="opts">${optsHtml}</div>
      ${locked ? feedbackHtml(saved.correct, q.e) : ''}
      <div class="q-footer">
        ${!locked ? `<button class="btn-check" id="btnCheck_${qi}" onclick="checkMC(${qi})" disabled>Check answer</button>` : ''}
        ${locked ? `<button class="btn-next" id="btnNext" onclick="nextQ()" style="background:${activeSec.color}">Next →</button>` : ''}
      </div>
    </div>`;
}

function selectMC(qi, j) {
  if (answered[qi] !== undefined) return;
  mcSel = j;
  document.querySelectorAll(`[id^="opt_${qi}_"]`).forEach((b, k) => {
    b.className = 'opt-btn' + (k === j ? ' selected' : '');
  });
  document.getElementById(`btnCheck_${qi}`).disabled = false;
}

function checkMC(qi) {
  const q = Q[qi];
  if (mcSel === null || answered[qi] !== undefined) return;
  const correct = mcSel === q.a;
  answered[qi] = {correct, selection: mcSel};
  save();
  renderMC(document.getElementById('questionArea'), q, qi);
  updateStats();
}

// ═══════════════════════════════════════════════
// TF
// ═══════════════════════════════════════════════
function renderTF(area, q, qi) {
  const locked = answered[qi] !== undefined;
  const saved = answered[qi];

  function tfCls(val) {
    if (!locked) return 'tf-btn' + (tfSel === val ? ' selected' : '');
    if (val === q.a) return 'tf-btn tf-correct';
    if (val === (saved && saved.selection) && !saved.correct) return 'tf-btn tf-wrong';
    return 'tf-btn';
  }

  area.innerHTML = `
    <div class="q-card${locked?(saved.correct?' correct':' wrong'):''}" id="qcard_${qi}">
      <div class="q-num" style="color:${activeSec.color}">Q${qi+1} of ${Q.length}</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="tf-row">
        <button class="${tfCls(true)}" id="tf_${qi}_true" onclick="selectTF(${qi},true)" ${locked?'disabled':''}>✓ True</button>
        <button class="${tfCls(false)}" id="tf_${qi}_false" onclick="selectTF(${qi},false)" ${locked?'disabled':''}>✗ False</button>
      </div>
      ${locked ? feedbackHtml(saved.correct, q.e) : ''}
      <div class="q-footer">
        ${!locked ? `<button class="btn-check" id="btnCheck_${qi}" onclick="checkTF(${qi})" disabled>Check answer</button>` : ''}
        ${locked ? `<button class="btn-next" id="btnNext" onclick="nextQ()" style="background:${activeSec.color}">Next →</button>` : ''}
      </div>
    </div>`;
}

function selectTF(qi, val) {
  if (answered[qi] !== undefined) return;
  tfSel = val;
  document.getElementById(`tf_${qi}_true`).className = 'tf-btn' + (val === true ? ' selected' : '');
  document.getElementById(`tf_${qi}_false`).className = 'tf-btn' + (val === false ? ' selected' : '');
  document.getElementById(`btnCheck_${qi}`).disabled = false;
}

function checkTF(qi) {
  const q = Q[qi];
  if (tfSel === null || answered[qi] !== undefined) return;
  const correct = tfSel === q.a;
  answered[qi] = {correct, selection: tfSel};
  save();
  renderTF(document.getElementById('questionArea'), q, qi);
  updateStats();
}

// ═══════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════
function renderDD(area, q, qi) {
  const locked = answered[qi] !== undefined;
  const saved = answered[qi];
  // Restore placements if revisiting
  if (locked && saved.selection) ddPlacements = {...saved.selection};

  // Build bank items (not yet placed)
  const bankItems = locked
    ? [] // all are in zones when locked
    : q.items.filter(item => !ddPlacements[item]);

  // Items per zone
  function zoneItems(zone) {
    if (locked) return q.items.filter(item => (saved.selection||{})[item] === zone);
    return q.items.filter(item => ddPlacements[item] === zone);
  }

  function itemHtml(item, zone) {
    let cls = 'dd-item';
    if (locked) {
      const correct = q.ans[item] === zone;
      cls += correct ? ' item-correct' : ' item-wrong';
    }
    return `<div class="${cls}" draggable="${!locked}"
      ondragstart="ddStart(event,'${esc(item)}')"
      ondragend="ddEnd(event)">${escHtml(item)}</div>`;
  }

  const bankHtml = bankItems.map(item => itemHtml(item, null)).join('');

  const zonesHtml = q.zones.map(zone => `
    <div class="dd-zone" id="ddz_${qi}_${esc(zone)}"
      ondragover="ddOver(event,'${esc(zone)}')"
      ondragleave="ddLeave(event,'${esc(zone)}')"
      ondrop="ddDrop(event,${qi},'${esc(zone)}')">
      <div class="dd-zone-label">${escHtml(zone)}</div>
      <div class="dd-items" id="ddi_${qi}_${esc(zone)}">${zoneItems(zone).map(item=>itemHtml(item,zone)).join('')}</div>
    </div>`).join('');

  let resultCls = '';
  if (locked) {
    resultCls = saved.correct ? ' correct' : (saved.numCorrect > 0 ? ' partial' : ' wrong');
  }

  area.innerHTML = `
    <div class="q-card${resultCls}" id="qcard_${qi}">
      <div class="q-num" style="color:${activeSec.color}">Q${qi+1} of ${Q.length}</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="dd-area">
        <div class="dd-bank-wrap">
          <div class="dd-bank-label">Items to place</div>
          <div class="dd-bank" id="ddbank_${qi}"
            ondragover="ddOver(event,'__bank__')"
            ondragleave="ddLeave(event,'__bank__')"
            ondrop="ddDrop(event,${qi},'__bank__')">${bankHtml}</div>
        </div>
        <div class="dd-zones">${zonesHtml}</div>
      </div>
      ${locked ? feedbackHtml(saved.correct, q.e + (saved.correct?'':` (${saved.numCorrect}/${q.items.length} correct)`)) : ''}
      <div class="q-footer">
        ${!locked ? `<button class="btn-check" id="btnCheck_${qi}" onclick="checkDD(${qi})" disabled>Check answer</button>` : ''}
        ${locked ? `<button class="btn-next" id="btnNext" onclick="nextQ()" style="background:${activeSec.color}">Next →</button>` : ''}
      </div>
    </div>`;
}

function ddStart(e, item) {
  ddDraggingItem = item;
  setTimeout(() => {
    const el = e.target;
    if (el) el.classList.add('dragging');
  }, 0);
}
function ddEnd(e) { e.target.classList.remove('dragging'); }

function ddOver(e, zone) {
  e.preventDefault();
  const id = zone === '__bank__' ? 'ddbank_' + qList[qPos] : 'ddz_' + qList[qPos] + '_' + zone;
  const el = document.getElementById(id);
  if (el) el.classList.add('dragover');
}

function ddLeave(e, zone) {
  const id = zone === '__bank__' ? 'ddbank_' + qList[qPos] : 'ddz_' + qList[qPos] + '_' + zone;
  const el = document.getElementById(id);
  if (el) el.classList.remove('dragover');
}

function ddDrop(e, qi, zone) {
  e.preventDefault();
  const q = Q[qi];
  if (!ddDraggingItem || answered[qi] !== undefined) return;

  // Remove from current placement
  delete ddPlacements[ddDraggingItem];

  // Assign new placement (if not bank)
  if (zone !== '__bank__') ddPlacements[ddDraggingItem] = zone;

  // Check if all placed to enable button
  const allPlaced = q.items.every(item => ddPlacements[item]);

  // Re-render the DD question preserving placements
  renderDD(document.getElementById('questionArea'), q, qi);
  const btn = document.getElementById(`btnCheck_${qi}`);
  if (btn) btn.disabled = !allPlaced;
  ddDraggingItem = null;
}

function checkDD(qi) {
  const q = Q[qi];
  if (answered[qi] !== undefined) return;
  let numCorrect = 0;
  q.items.forEach(item => { if (ddPlacements[item] === q.ans[item]) numCorrect++; });
  const correct = numCorrect === q.items.length;
  answered[qi] = {correct, selection: {...ddPlacements}, numCorrect, total: q.items.length};
  save();
  renderDD(document.getElementById('questionArea'), q, qi);
  updateStats();
}

// ═══════════════════════════════════════════════
// NEXT / COMPLETE
// ═══════════════════════════════════════════════
function nextQ() {
  if (qPos + 1 < qList.length) {
    qPos++;
    renderQ();
  } else {
    showComplete();
  }
}

function showComplete() {
  const sec = activeSec;
  let correct = 0, wrong = 0;
  for (let qi = sec.start; qi <= sec.end; qi++) {
    if (answered[qi] !== undefined) { answered[qi].correct ? correct++ : wrong++; }
  }
  const total = sec.end - sec.start + 1;
  const pct = Math.round(correct/total*100);

  let headline, sub;
  if (pct>=90) { headline='Outstanding! 🎓'; sub='Excellent command of this section.'; }
  else if (pct>=75) { headline='Great work!'; sub='Solid — review the ones you missed to lock it in.'; }
  else if (pct>=60) { headline='Good effort'; sub='You have the foundations. Revisit the tricky ones.'; }
  else { headline='Keep studying'; sub='Go back through the material and try again!'; }

  document.getElementById('questionArea').innerHTML = `
    <div class="complete-card">
      <div class="score-ring">
        <div class="score-num">${correct}</div>
        <div class="score-pct">${pct}%</div>
      </div>
      <div class="complete-title">${headline}</div>
      <div class="complete-sub">${sub}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val" style="color:#16A34A">${correct}</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-box"><div class="stat-val" style="color:#DC2626">${wrong}</div><div class="stat-lbl">Wrong</div></div>
        <div class="stat-box"><div class="stat-val" style="color:#2563EB">${total-correct-wrong}</div><div class="stat-lbl">Skipped</div></div>
      </div>
      <div class="complete-btns">
        <button class="btn-retry" onclick="retrySection()">↺ Retry section</button>
        <button class="btn-home" onclick="goHome()">← All sections</button>
      </div>
    </div>`;
  document.getElementById('qnavCount').textContent = '';
  document.getElementById('btnPrev').style.display = 'none';
  document.getElementById('btnResults').style.display = 'none';
}

function retrySection() {
  const sec = activeSec;
  for (let qi = sec.start; qi <= sec.end; qi++) delete answered[qi];
  save();
  document.getElementById('btnPrev').style.display = 'inline-block';
  openSection(SECTIONS.indexOf(sec));
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function feedbackHtml(correct, exp) {
  const cls = correct ? 'correct' : 'wrong';
  const icon = correct ? '✓' : '✗';
  const label = correct ? 'Correct!' : 'Incorrect.';
  return `<div class="feedback ${cls}">${icon} <strong>${label}</strong> ${escHtml(exp)}</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Safe attribute-value escape (no quotes or special chars that break inline handlers)
function esc(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderHome();
</script>
