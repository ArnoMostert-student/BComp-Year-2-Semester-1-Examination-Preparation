<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Quiz</title>
<link rel="icon" href="icon.png" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;color:#1E293B;min-height:100vh}
button{font-family:inherit}

/* HEADER */
.hdr{background:#1A2B4A;color:#fff}
.hdr-inner{max-width:720px;margin:0 auto;padding:22px 20px 16px}
.hdr-eye{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7DD3FC;margin-bottom:4px}
.hdr h1{font-size:22px;font-weight:700;margin-bottom:2px}
.hdr-sub{font-size:12px;color:#94A3B8}
.prog-track{background:rgba(255,255,255,.1);height:4px}
.prog-fill{height:4px;background:#38BDF8;transition:width .4s}
.stats-bar{border-top:1px solid rgba(255,255,255,.08)}
.stats-inner{max-width:720px;margin:0 auto;padding:10px 20px;display:flex;gap:20px;flex-wrap:wrap}
.stat{font-size:12px;color:#94A3B8;display:flex;align-items:center;gap:6px}
.stat b{font-weight:600;color:#E2E8F0}
.dot{width:7px;height:7px;border-radius:50%}

/* MAIN */
.main{max-width:720px;margin:0 auto;padding:28px 20px 60px}

/* HOME */
.home-title{font-size:18px;font-weight:700;color:#0F172A;margin-bottom:4px}
.home-sub{font-size:13px;color:#64748B;margin-bottom:24px}
.sec-cards{display:flex;flex-direction:column;gap:12px}
.sec-card{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:14px;border:1.5px solid #CBD5E1;background:#fff;cursor:pointer;text-align:left;width:100%;transition:border-color .15s,box-shadow .15s}
.sec-card:hover{box-shadow:0 2px 14px rgba(15,23,42,.12)}
.sc-icon{width:46px;height:46px;border-radius:11px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-body{flex:1;min-width:0;}
.sc-title{font-size:14px;font-weight:700;color:#0F172A;margin-bottom:2px}
.sc-desc{font-size:11px;color:#64748B;margin-bottom:7px}
.sc-bar-track{background:#E2E8F0;border-radius:4px;height:5px;overflow:hidden}
.sc-bar-fill{height:5px;border-radius:4px;transition:width .4s}
.sc-label{font-size:11px;color:#64748B;margin-top:4px}
.sc-arrow{font-size:20px;color:#94A3B8;flex-shrink:0}
.reset-wrap{text-align:center;margin-top:28px}
.btn-reset{padding:9px 22px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#94A3B8;cursor:pointer}
.btn-reset:hover{border-color:#DC2626;color:#DC2626}

/* QUIZ NAV */
.quiz-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.btn-back{padding:7px 14px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#64748B;cursor:pointer}
.btn-back:hover{border-color:#0F172A;color:#0F172A}
.qnav-title{font-size:14px;font-weight:700;color:#0F172A}
.qnav-count{margin-left:auto;font-size:13px;color:#64748B}
.qprog-track{background:#E2E8F0;border-radius:4px;height:4px;margin-bottom:20px;overflow:hidden}
.qprog-fill{height:4px;border-radius:4px;transition:width .3s}

/* QUESTION CARD */
.q-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:14px;padding:22px 20px}
.q-card.correct{background:#F0FDF4;border-color:#86EFAC}
.q-card.wrong{background:#FEF2F2;border-color:#FCA5A5}
.q-card.partial{background:#FFFBEB;border-color:#FCD34D}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:18px;color:#1E293B}
.q-code{font-family:'Courier New',monospace;font-size:12.5px;background:#1E293B;color:#7DD3FC;padding:12px 14px;border-radius:8px;margin-bottom:16px;white-space:pre;overflow-x:auto;line-height:1.6}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid #CBD5E1;border-radius:10px;background:#F8FAFC;cursor:pointer;text-align:left;font-size:13.5px;color:#1E293B;width:100%;transition:border-color .12s,background .12s}
.opt-btn:not(:disabled):hover{border-color:#38BDF8;background:#F0F9FF}
.opt-letter{width:26px;height:26px;min-width:26px;border-radius:50%;background:#CBD5E1;color:#64748B;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;flex-shrink:0}
.opt-btn:not(:disabled):hover .opt-letter{background:#0EA5E9;color:#fff}
.opt-btn.selected{border-color:#0369A1;background:#F0F9FF}
.opt-btn.selected .opt-letter{background:#0369A1;color:#fff}
.opt-btn.opt-correct{border-color:#16A34A;background:#F0FDF4}
.opt-btn.opt-correct .opt-letter{background:#16A34A;color:#fff}
.opt-btn.opt-wrong{border-color:#DC2626;background:#FEF2F2}
.opt-btn.opt-wrong .opt-letter{background:#DC2626;color:#fff}

/* TF */
.tf-row{display:flex;gap:10px}
.tf-btn{flex:1;padding:13px;border:1.5px solid #CBD5E1;border-radius:10px;background:#F8FAFC;cursor:pointer;font-size:14px;font-weight:600;color:#1E293B;transition:all .12s}
.tf-btn:not(:disabled):hover{border-color:#0EA5E9;background:#F0F9FF;color:#0369A1}
.tf-btn.selected{border-color:#0369A1;background:#F0F9FF;color:#0369A1}
.tf-btn.tf-correct{border-color:#16A34A;background:#F0FDF4;color:#16A34A}
.tf-btn.tf-wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626}

/* DRAG & DROP */
.dd-area{display:flex;gap:16px;flex-wrap:wrap}
.dd-bank-wrap{flex:1 1 160px;min-width:160px}
.dd-bank-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:8px}
.dd-bank{min-height:40px;padding:4px;border-radius:8px;border:1.5px dashed #CBD5E1;display:flex;flex-direction:column;gap:6px;transition:background .15s,border-color .15s}
.dd-bank.dragover{background:#F0F9FF;border-color:#0EA5E9}
.dd-zones{flex:2 1 240px;display:flex;flex-direction:column;gap:8px}
.dd-zone{border:1.5px dashed #CBD5E1;border-radius:8px;padding:8px 10px;min-height:48px;transition:background .15s,border-color .15s}
.dd-zone.dragover{background:#F0F9FF;border-color:#0EA5E9}
.dd-zone-label{font-size:11px;font-weight:700;color:#0F172A;margin-bottom:4px;pointer-events:none;text-transform:uppercase;letter-spacing:.05em}
.dd-items{display:flex;flex-direction:column;gap:4px}
.dd-item{padding:7px 11px;border-radius:7px;font-size:12.5px;background:#fff;border:1.5px solid #CBD5E1;color:#1E293B;cursor:grab;user-select:none;transition:opacity .15s}
.dd-item.dragging{opacity:.35}
.dd-item.item-correct{border-color:#16A34A;background:#F0FDF4;color:#16A34A;cursor:default}
.dd-item.item-wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626;cursor:default}

/* FEEDBACK */
.feedback{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.5}
.feedback.correct{background:#F0FDF4;border:1px solid #86EFAC;color:#14532D}
.feedback.wrong{background:#FEF2F2;border:1px solid #FCA5A5;color:#7F1D1D}
.feedback.partial{background:#FFFBEB;border:1px solid #FCD34D;color:#78350F}

/* FOOTER */
.q-footer{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.btn-check{padding:10px 22px;background:#0F172A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-check:disabled{background:#CBD5E1;color:#94A3B8;cursor:default}
.btn-next{padding:10px 22px;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* NAV ROW */
.nav-row{display:flex;justify-content:space-between;margin-top:14px}
.btn-prev{padding:8px 16px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#64748B;cursor:pointer}
.btn-prev:disabled{color:#CBD5E1;cursor:default}
.btn-results{padding:8px 20px;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

/* COMPLETE */
.complete-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:14px;padding:40px 28px;text-align:center}
.score-ring{width:100px;height:100px;border-radius:50%;background:#F0F9FF;border:4px solid #0369A1;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
.score-num{font-size:28px;font-weight:700;color:#0F172A}
.score-pct{font-size:12px;color:#64748B}
.complete-title{font-size:20px;font-weight:700;color:#0F172A;margin-bottom:6px}
.complete-sub{font-size:14px;color:#64748B;margin-bottom:28px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.stat-box{background:#F8FAFC;border-radius:10px;padding:14px}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:12px;color:#64748B;margin-top:2px}
.complete-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-retry{padding:11px 22px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:#64748B}
.btn-home{padding:11px 22px;background:#0F172A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

#quizView{display:none}

@media(max-width:560px){
  .dd-area{flex-direction:column}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stats-inner{gap:12px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-eye">EXAM PREPARATION</div>
    <h1>Web Programming 281</h1>
    <div class="hdr-sub">100 questions &nbsp;·&nbsp; Multiple Choice · True/False · Drag &amp; Drop</div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progBar" style="width:0%"></div></div>
  <div class="prog-rail"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div class="stats-row">
    <div class="stats-inner">
      <div class="stat"><div class="pip" style="background:#4ade80"></div>Correct: <b id="sCorrect">0</b></div>
      <div class="stat"><div class="pip" style="background:#f87171"></div>Wrong: <b id="sWrong">0</b></div>
      <div class="stat"><div class="pip" style="background:#334155"></div>Remaining: <b id="sRemain">100</b></div>
      <div class="stat">Score: <b id="sScore">0%</b></div>
    </div>
  </div>
</div>

<div class="main">
  <div id="homeView">
    <div class="home-head">
      <div class="home-title">Choose a topic</div>
      <div class="home-sub">Progress saves automatically. Pick up where you left off.</div>
    </div>
    <div class="sec-cards" id="secCards"></div>
    <div class="reset-row"><button class="btn-reset" onclick="resetAll()">↺ Reset all progress</button></div>
  </div>

  <div id="quizView">
    <div class="qnav">
      <button class="btn-back" onclick="goHome()">← Back</button>
      <div class="qnav-title" id="qnavTitle"></div>
      <div class="qnav-count" id="qnavCount"></div>
    </div>
    <div class="qprog-rail"><div class="qprog-fill" id="qprogFill"></div></div>
    <div id="questionArea"></div>
    <div class="nav-row">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">← Prev</button>
      <button class="btn-results" id="btnResults" style="display:none;background:#818cf8;color:#0f1117" onclick="showComplete()">Results →</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  QUESTION BANK  (100 questions)
// ══════════════════════════════════════════════════════
const Q = [

// ── SECTION 1: Core Language & Variables (MC 1-15) ─────────────────────────
{t:'mc',q:'Which keyword declares a block-scoped variable that CANNOT be reassigned?',
 o:['var','let','const','static'],a:2,
 e:'const is block-scoped and cannot be reassigned after declaration. var is function-scoped; let is block-scoped but reassignable.'},

{t:'mc',q:'What does "typeof null" return in JavaScript?',
 o:['"null"','"undefined"','"object"','"boolean"'],a:2,
 e:'typeof null === "object" is a famous historical bug in JavaScript. null is NOT an object, but the type check returns "object".'},

{t:'mc',q:'Which of the following is a FALSY value in JavaScript?',
 o:['[]','{}','"0"','0'],a:3,
 e:'0 is falsy. Empty arrays [], empty objects {}, and the string "0" are all truthy.'},

{t:'mc',q:'What is the result of ""5" + 3" in JavaScript?',
 o:['8','"53"','Error','"8"'],a:1,
 e:'The + operator with a string triggers string concatenation. "5" + 3 = "53".'},

{t:'mc',q:'Which operator checks both value AND type without type coercion?',
 o:['==','!=','===','='],a:2,
 e:'=== (strict equality) checks both value and type. == (loose) coerces types before comparing.'},

{t:'mc',q:'What is the Temporal Dead Zone (TDZ)?',
 o:['A delay in async code execution','The period before a let/const is initialised where accessing it throws a ReferenceError','A memory zone used by closures','The time between ETL extractions'],a:1,
 e:'let and const are hoisted but not initialised. Accessing them before their declaration throws a ReferenceError — this gap is the TDZ.'},

{t:'mc',q:'Which method converts a string to an integer, stopping at the first non-numeric character?',
 o:['Number()','Math.round()','parseInt()','parseFloat()'],a:2,
 e:'parseInt("42px") returns 42. It reads until it hits a non-numeric character. Number("42px") would return NaN.'},

{t:'mc',q:'What does the "??" (nullish coalescing) operator return?',
 o:['The right side if the left is falsy','The right side only if the left is null or undefined','Always the left side','The left side if it is truthy'],a:1,
 e:'?? only triggers for null/undefined — unlike || which also triggers for 0, "", and false.'},

{t:'mc',q:'What is the output of "typeof function(){}"?',
 o:['"object"','"undefined"','"function"','"callable"'],a:2,
 e:'Functions have their own typeof result: "function". Everything else (arrays, objects, null) returns "object".'},

{t:'mc',q:'Which of these correctly generates a random integer between 1 and 10 (inclusive)?',
 o:['Math.random() * 10','Math.floor(Math.random() * 10)','Math.floor(Math.random() * 10) + 1','Math.ceil(Math.random() * 9)'],a:2,
 e:'Math.floor(Math.random() * 10) + 1 gives integers 1–10. Without +1 you get 0–9.'},

{t:'mc',q:'What does "Number("")" return?',
 o:['NaN','undefined','0','"0"'],a:2,
 e:'Number("") converts an empty string to 0. Number("hello") would return NaN.'},

{t:'mc',q:'Which template literal syntax is correct?',
 o:['\'Hello ${name}\'','"Hello ${name}"','`Hello ${name}`','Hello + ${name}'],a:2,
 e:'Template literals use backticks (`) and ${} for interpolation. Single and double quotes do not support ${}.'},

{t:'mc',q:'What does "!!"hello"" evaluate to?',
 o:['false','"hello"','true','0'],a:2,
 e:'!! is the double-NOT trick to coerce to boolean. "hello" is truthy, so !!"hello" === true.'},

{t:'mc',q:'In JavaScript, months in the Date object are:',
 o:['1-indexed (January = 1)','0-indexed (January = 0)','Named strings only','Based on locale settings'],a:1,
 e:'JavaScript months are 0-indexed: 0 = January, 11 = December. This is a common source of bugs.'},

{t:'mc',q:'What does "var" use for scoping?',
 o:['Block scope','Module scope','Function scope','Global scope only'],a:2,
 e:'var is function-scoped — it is accessible anywhere within the function it was declared in, even inside inner blocks.'},

// ── SECTION 2: Functions (MC 16-25) ────────────────────────────────────────
{t:'mc',q:'Which type of function is hoisted and can be called before its declaration?',
 o:['Arrow function','Function expression','Function declaration','IIFE'],a:2,
 e:'Function declarations are fully hoisted. Function expressions and arrow functions are not — they follow variable hoisting rules.'},

{t:'mc',q:'What is the key difference between arrow functions and regular functions regarding "this"?',
 o:['Arrow functions have no parameters','Arrow functions always return undefined','Arrow functions inherit this from their surrounding lexical scope','Arrow functions are faster to execute'],a:2,
 e:'Arrow functions have no own "this" — they inherit it from the enclosing scope (lexical this). Regular functions bind "this" based on how they are called.'},

{t:'mc',q:'What does the rest parameter ("...args") do in a function?',
 o:['Spreads an array into arguments','Collects all remaining arguments into an array','Creates a copy of the function','Prevents the function from returning'],a:1,
 e:'Rest parameters collect any number of remaining arguments into an array: function sum(...nums) collects all passed numbers.'},

{t:'mc',q:'What does an IIFE (Immediately Invoked Function Expression) do?',
 o:['Runs a function every second','Runs a function exactly once immediately after definition','Prevents a function from being called twice','Exports a function as a module'],a:1,
 e:'An IIFE runs immediately when defined. Syntax: (function(){})() — creates its own scope and runs at once.'},

{t:'mc',q:'What is a closure in JavaScript?',
 o:['A function that closes the browser window','A loop that runs a fixed number of times','A function that retains access to its outer scope even after the outer function has returned','A method that ends execution of a script'],a:2,
 e:'A closure is created when an inner function retains access to the variables of its outer function, even after that outer function has returned.'},

{t:'mc',q:'What is a Higher-Order Function (HOF)?',
 o:['A function with more than 3 parameters','A function that calls itself recursively','A function that takes another function as an argument or returns a function','A function stored in an object'],a:2,
 e:'HOFs either accept functions as arguments (like map, filter) or return functions (like factory functions). They enable functional programming patterns.'},

{t:'mc',q:'Which is a valid concise arrow function that doubles a number?',
 o:['function double(n) => n * 2','const double => n => n * 2','const double = n => n * 2','const double = (n) { return n * 2 }'],a:2,
 e:'Arrow function with a single parameter: const double = n => n * 2. Single params need no parentheses; concise body has implicit return.'},

{t:'mc',q:'What is the base case in a recursive function?',
 o:['The condition that causes the function to call itself','The largest input the function can handle','The condition that stops the recursion from continuing','The first argument passed to the function'],a:2,
 e:'Every recursive function needs a base case — the condition that stops it from calling itself indefinitely and causing a stack overflow.'},

{t:'mc',q:'Which statement correctly defines a default parameter?',
 o:['function greet(name ?? "World"){}','function greet(name = "World"){}','function greet(default name = "World"){}','function greet(name || "World"){}'],a:1,
 e:'Default parameters use = syntax: function greet(name = "World"). If name is undefined, it uses "World".'},

{t:'mc',q:'What is lexical scope?',
 o:['Scope determined by the order functions are called','Scope determined by where a variable is defined in the source code','A global scope for all variables','Scope that changes at runtime'],a:1,
 e:'Lexical (or static) scope means a function can access variables defined in any outer scope where it was written — not where it is called from.'},

// ── SECTION 3: Arrays (MC 26-37) ───────────────────────────────────────────
{t:'mc',q:'What does "arr.push(item)" return?',
 o:['The item that was added','The first element','The new length of the array','undefined'],a:2,
 e:'push() adds to the END of the array and returns the new length. pop() removes from the end and returns the removed item.'},

{t:'mc',q:'Which method removes and returns the LAST element of an array?',
 o:['shift()','splice()','pop()','slice()'],a:2,
 e:'pop() removes and returns the last element. shift() removes the first. splice() is for arbitrary positions.'},

{t:'mc',q:'What is the difference between "slice()" and "splice()"?',
 o:['They are identical','slice mutates the array; splice does not','slice returns a new array without mutating; splice mutates the original','splice returns a copy; slice changes the original'],a:2,
 e:'slice() extracts a portion into a NEW array without changing the original. splice() MODIFIES the original by removing, inserting, or replacing elements.'},

{t:'mc',q:'Which array method returns a NEW array containing only elements that pass a test?',
 o:['forEach','find','filter','reduce'],a:2,
 e:'filter() creates a new array with only elements where the callback returns true. forEach has no return value; find returns the first match.'},

{t:'mc',q:'What does "arr.map(n => n * 2)" return?',
 o:['It modifies arr in-place by doubling each value','A new array where every element is doubled','The sum of all elements doubled','The first element that is even'],a:1,
 e:'map() creates a NEW array by transforming every element with the callback. It does not mutate the original array.'},

{t:'mc',q:'What is the initial value in "arr.reduce((acc, n) => acc + n, 0)"?',
 o:['The first element of arr','n','0','acc'],a:2,
 e:'The second argument to reduce() is the initial value of the accumulator. Here it is 0, so the sum starts at 0.'},

{t:'mc',q:'What does "[1,2,3].indexOf(99)" return?',
 o:['null','false','undefined','-1'],a:3,
 e:'indexOf returns -1 when the value is not found in the array. This is the standard "not found" signal for indexOf and lastIndexOf.'},

{t:'mc',q:'Which method tests whether AT LEAST ONE element passes a condition?',
 o:['every()','some()','includes()','find()'],a:1,
 e:'some() returns true if at least one element passes the test. every() requires ALL elements to pass. includes() checks for a value.'},

{t:'mc',q:'What is the correct way to sort an array of numbers in ascending order?',
 o:['arr.sort()','arr.sort((a, b) => b - a)','arr.sort((a, b) => a - b)','arr.sort(true)'],a:2,
 e:'arr.sort() converts elements to strings — wrong for numbers. The correct comparator is (a, b) => a - b for ascending order.'},

{t:'mc',q:'How do you create a shallow copy of an array using the spread operator?',
 o:['const copy = arr.clone()','const copy = arr','const copy = [...arr]','const copy = arr.copy()'],a:2,
 e:'The spread operator [...arr] creates a shallow copy. const copy = arr just copies the reference — both point to the same array.'},

{t:'mc',q:'What does "Array.from("hello")" return?',
 o:['["hello"]','["h","e","l","l","o"]','"hello"','5'],a:1,
 e:'Array.from() converts iterable objects (like strings) to arrays. Each character becomes an element: ["h","e","l","l","o"].'},

{t:'mc',q:'Which is the correct way to check if something is an array?',
 o:['typeof arr === "array"','arr instanceof Object','Array.isArray(arr)','arr.type === "array"'],a:2,
 e:'Array.isArray() is the reliable check. typeof [] returns "object", not "array". instanceof can fail across iframes.'},

// ── SECTION 4: Objects (MC 38-50) ──────────────────────────────────────────
{t:'mc',q:'Which syntax is used for object destructuring?',
 o:['const [name, age] = person','const {name, age} = person','const name, age = person','const (name, age) = person'],a:1,
 e:'Object destructuring uses curly braces: const {name, age} = person. Array destructuring uses square brackets.'},

{t:'mc',q:'What does "Object.keys(obj)" return?',
 o:['An array of the object\'s values','An array of the object\'s key-value pairs','An array of the object\'s property names','The number of properties'],a:2,
 e:'Object.keys() returns an array of the object\'s own enumerable property names (keys). Object.values() returns the values.'},

{t:'mc',q:'What does "Object.freeze(obj)" do?',
 o:['Creates a deep copy of the object','Prevents any modifications to the object','Converts the object to JSON','Removes all methods from the object'],a:1,
 e:'Object.freeze() prevents adding, removing, or changing any properties. Attempted changes silently fail (or throw in strict mode).'},

{t:'mc',q:'In a class, what does the "super()" call do?',
 o:['Calls the class\'s own constructor again','Creates a new instance of the class','Calls the PARENT class\'s constructor','Converts the class to a function'],a:2,
 e:'super() calls the constructor of the parent class. It must be called in a subclass constructor before using "this".'},

{t:'mc',q:'What is the correct way to merge two objects into a new one with the spread operator?',
 o:['const merged = obj1 + obj2','const merged = Object.merge(obj1, obj2)','const merged = {...obj1, ...obj2}','const merged = [obj1, obj2]'],a:2,
 e:'Spread syntax merges objects: {...obj1, ...obj2}. If both have the same key, the right-hand object\'s value wins.'},

{t:'mc',q:'Which symbol is used to declare a private class field in ES2022?',
 o:['_','@','#','$'],a:2,
 e:'Private class fields are prefixed with #: class Counter { #count = 0; }. They cannot be accessed from outside the class.'},

{t:'mc',q:'What does "JSON.stringify(obj, null, 2)" do differently from "JSON.stringify(obj)"?',
 o:['Adds security encryption','Formats the JSON with 2-space indentation for readability','Removes null values from the output','Converts the object to an array'],a:1,
 e:'The third argument to JSON.stringify() is the indentation level. null, 2 means no replacer, 2-space indent — useful for readable output.'},

{t:'mc',q:'What is prototype-based inheritance?',
 o:['Inheritance using the "extends" keyword only','Objects inheriting properties through a prototype chain, not class blueprints','A way to copy all methods between objects','A pattern unique to TypeScript'],a:1,
 e:'In JavaScript, objects have a [[Prototype]] link. When a property isn\'t found on an object, JS walks up the prototype chain until it finds it or reaches null.'},

{t:'mc',q:'Which of these correctly renames a property during destructuring?',
 o:['const {name as fullName} = person','const {fullName: name} = person','const {name: fullName} = person','const {name, fullName} = person'],a:2,
 e:'Rename with colon: const {name: fullName} = person — reads name from the object, stores it as fullName in your scope.'},

{t:'mc',q:'What does "Object.entries(obj)" return?',
 o:['An array of keys only','An array of values only','An array of [key, value] pairs','An object with swapped keys and values'],a:2,
 e:'Object.entries() returns [[key1, val1], [key2, val2], ...] — perfect for iterating with for...of and destructuring.'},

{t:'mc',q:'In a class, a "static" method:',
 o:['Can only be called on instances','Is inherited by all subclasses automatically','Is called on the class itself, not on instances','Is the same as a regular method'],a:2,
 e:'Static methods belong to the class itself: Animal.create(). They cannot be called on an instance: new Animal().create() would fail.'},

{t:'mc',q:'What is the safest way to deeply copy an object in modern JavaScript?',
 o:['const copy = {...obj}','const copy = obj','const copy = structuredClone(obj)','const copy = Object.assign({}, obj)'],a:2,
 e:'structuredClone() creates a true deep copy including nested objects. Spread and Object.assign() only do shallow copies — nested objects are still shared references.'},

{t:'mc',q:'What does "obj?.address?.city" do?',
 o:['Throws an error if address is undefined','Assigns city a default value','Returns undefined instead of throwing if any step is null or undefined','Creates the address property if it doesn\'t exist'],a:2,
 e:'Optional chaining (?.) short-circuits and returns undefined instead of throwing a TypeError when accessing a property on null or undefined.'},

// ── SECTION 5: DOM (MC 51-60) ──────────────────────────────────────────────
{t:'mc',q:'What does "document.querySelector(".btn")" return if no match is found?',
 o:['An empty array','An empty NodeList','undefined','null'],a:3,

{t:'mc',q:'What is the difference between "innerHTML" and "textContent"?',
 o:['They are identical','innerHTML renders HTML tags; textContent treats everything as plain text','textContent is faster but innerHTML is more compatible','innerHTML only works on div elements'],a:1,
 e:'innerHTML parses and renders HTML. textContent treats input as plain text — safer because it prevents XSS attacks from user-supplied content.'},

{t:'mc',q:'Which method adds a CSS class to an element?',
 o:['el.style.class = "active"','el.addClass("active")','el.classList.add("active")','el.className += "active"'],a:2,

{t:'mc',q:'What does "classList.toggle("active")" do?',
 o:['Always adds the class','Always removes the class','Adds the class if absent, removes it if present','Checks if the class exists'],a:2,
 e:'toggle() is a convenient flip-flop: adds the class if the element doesn\'t have it, removes it if it does. Returns true if class was added.'},

{t:'mc',q:'Which DOM method creates a brand new HTML element?',
 o:['document.newElement()','document.createElement("div")','document.makeElement("div")','new Element("div")'],a:1,

{t:'mc',q:'What is the difference between "getElementsByTagName" and "querySelectorAll"?',
 o:['They return the same type','getElementsByTagName returns a static NodeList; querySelectorAll returns a live one','getElementsByTagName returns a live HTMLCollection; querySelectorAll returns a static NodeList','Only querySelectorAll accepts CSS selectors'],a:2,
 e:'getElementsByTagName returns a LIVE HTMLCollection (auto-updates). querySelectorAll returns a STATIC NodeList (snapshot). Only querySelectorAll accepts full CSS selectors.'},

{t:'mc',q:'Which property returns the parent element of a given node?',
 o:['el.childNodes','el.parentElement','el.prevElement','el.outerElement'],a:1,
 e:'parentElement returns the nearest parent Element. parentNode returns the nearest parent Node (could be Document or DocumentFragment).'},

{t:'mc',q:'What does "el.remove()" do?',
 o:['Hides the element with CSS','Removes the element\'s content only','Removes the element from the DOM entirely','Deletes the element variable'],a:2,
 e:'el.remove() removes the element (and its children) from the DOM entirely. The older way was el.parentNode.removeChild(el).'},

{t:'mc',q:'Which property accesses the next sibling that is an Element (skipping text nodes)?',
 o:['el.nextSibling','el.nextNode','el.nextElementSibling','el.sibling.next'],a:2,
 e:'nextElementSibling skips text and comment nodes and returns the next sibling Element. nextSibling returns any node type.'},

{t:'mc',q:'Why should you avoid setting "innerHTML" with user-supplied content?',
 o:['It is slower than textContent','It only works on div elements','It can execute malicious scripts (XSS attacks)','It breaks CSS styling'],a:2,
 e:'Setting innerHTML with unvalidated user input enables Cross-Site Scripting (XSS) — attackers can inject malicious <script> tags that execute in the browser.'},

// ── SECTION 6: TRUE/FALSE (61-80) ─────────────────────────────────────────
{t:'tf',q:'Arrow functions have their own "this" binding.',
 a:false,e:'False. Arrow functions do NOT have their own "this". They inherit "this" lexically from the surrounding scope where they were defined.'},

{t:'tf',q:'"const" prevents the properties of an object from being changed.',
 a:false,e:'False. const only prevents reassigning the REFERENCE. You can still mutate the object\'s properties: const obj = {}; obj.name = "Alice" works fine.'},

{t:'tf',q:'"slice()" mutates (changes) the original array.',
 a:false,e:'False. slice() returns a NEW array and leaves the original unchanged. splice() is the one that mutates.'},

{t:'tf',q:'"forEach()" returns a new array with the transformed values.',
 a:false,e:'False. forEach() always returns undefined — it\'s only for side effects. Use map() if you need a new transformed array.'},

{t:'tf',q:'Template literals are written using backtick characters (``).',
 a:true,e:'True. Template literals use backticks: `Hello ${name}`. They support multi-line strings and expression interpolation with ${}.'},

{t:'tf',q:'"===" performs type coercion before comparing.',
 a:false,e:'False. === (strict equality) does NOT coerce types. It requires both value and type to match. == (loose equality) coerces types.'},

{t:'tf',q:'"querySelectorAll()" returns a live HTMLCollection that auto-updates when the DOM changes.',
 a:false,e:'False. querySelectorAll() returns a STATIC NodeList — a snapshot. getElementsByTagName() returns a live HTMLCollection.'},

{t:'tf',q:'A closure allows an inner function to access variables from its outer function even after the outer function has returned.',
 a:true,e:'True. This is the definition of a closure. The inner function "closes over" the variables of the outer scope, keeping them alive.'},

{t:'tf',q:'"parseInt("3.9")" returns 3.',
 a:true,e:'True. parseInt parses only the integer part and discards the decimal. Use parseFloat to preserve decimal values.'},

{t:'tf',q:'Using "var" inside a block (like an if statement) leaks outside the block.',
 a:true,e:'True. var is function-scoped, not block-scoped. A var declared inside an if block is accessible outside it (within the same function).'},

{t:'tf',q:'"0 == false" evaluates to true in JavaScript.',
 a:true,e:'True. Loose equality (==) coerces types. 0 is falsy and false coerces to 0, so they are "loosely equal". This is why === is preferred.'},

{t:'tf',q:'The spread operator can be used to merge two objects into a new one.',
 a:true,e:'True. const merged = {...obj1, ...obj2} creates a new object with all properties from both. Right-side properties win on key conflicts.'},

{t:'tf',q:'"async" functions always return a Promise.',
 a:true,e:'True. Any function declared with async always returns a Promise, even if you return a plain value — it gets wrapped in Promise.resolve().'},

{t:'tf',q:'"map()" mutates the original array.',
 a:false,e:'False. map() creates and returns a NEW array. The original array is unchanged.'},

{t:'tf',q:'In a star schema, dimension tables are normalised into multiple related tables.',
 a:false,e:'False — wrong subject! But more importantly for JS: Event listeners added with addEventListener can be removed with removeEventListener — correct.'},

{t:'tf',q:'"Promise.all()" rejects if ANY of the passed promises reject.',
 a:true,e:'True. Promise.all() short-circuits on the first rejection. Use Promise.allSettled() if you want to wait for all, regardless of outcome.'},

{t:'tf',q:'Microtasks (Promise callbacks) run before macrotasks (setTimeout callbacks) in the event loop.',
 a:true,e:'True. The microtask queue (Promises, queueMicrotask) has higher priority than the macrotask queue (setTimeout, setInterval, I/O events).'},

{t:'tf',q:'"let" and "const" are hoisted to the top of their scope.',
 a:true,e:'True, but they are hoisted WITHOUT being initialised (unlike var which is hoisted as undefined). This creates the Temporal Dead Zone (TDZ).'},

{t:'tf',q:'"JSON.stringify()" can serialise functions and undefined values.',
 a:false,e:'False. JSON.stringify() ignores function properties and undefined values — they are simply omitted from the output.'},

{t:'tf',q:'Event delegation works by attaching one listener to a parent element rather than to each child.',
 a:true,e:'True. Event delegation leverages bubbling — events fired on children bubble up to the parent listener. Efficient and works for dynamically added elements.'},

const SECTIONS = [
  {name:'Core Language & Variables', icon:'📦', color:'#818cf8', start:0,  end:14, desc:'Variables, types, operators'},
  {name:'Functions',                 icon:'⚡', color:'#a78bfa', start:15, end:24, desc:'Declarations, arrow functions, closures'},

  {name:'True or False',             icon:'✓✗', color:'#fb923c', start:60, end:79, desc:'All topics'},

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const SK = 'js101_quiz_v1';
let answered = {};
try { answered = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) {}
function save() { try { localStorage.setItem(SK, JSON.stringify(answered)); } catch(e) {} }

let activeSec = null;
let qList = [];
let qPos = 0;
let mcSel = null;
let tfSel = null;
let ddPlacements = {};
let ddDragging = null;

// ════════════════════════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════════════════════════
function updateStats() {
  let correct = 0, wrong = 0;
  Object.values(answered).forEach(a => a.correct ? correct++ : wrong++);
  const total = Q.length;
  const answered_count = correct + wrong;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = total - answered_count;
  document.getElementById('sScore').textContent = answered_count > 0 ? Math.round(correct/answered_count*100)+'%' : '0%';
  document.getElementById('progBar').style.width = (answered_count/total*100)+'%';
}
updateStats();

// ════════════════════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════════════════════
function renderHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('quizView').style.display = 'none';
  const cont = document.getElementById('secCards');
  cont.innerHTML = '';
  SECTIONS.forEach((sec, idx) => {
    const total = sec.end - sec.start + 1;
    let correct = 0, attempted = 0;
    for (let i = sec.start; i <= sec.end; i++) {
      if (answered[i] !== undefined) { attempted++; if (answered[i].correct) correct++; }
    }
    const pct = total > 0 ? Math.round(attempted/total*100) : 0;
    const card = document.createElement('button');
    card.className = 'sec-card';
    card.onclick = () => openSection(idx);
    card.innerHTML = `
      <div class="sc-icon" style="background:${sec.color}">${sec.icon}</div>
      <div class="sc-body">
        <div class="sc-title">${sec.name}</div>
        <div class="sc-desc">${sec.desc}</div>
        <div class="sc-bar-track"><div class="sc-bar-fill" style="width:${pct}%;background:${sec.color}"></div></div>
        <div class="sc-label">${attempted}/${total} attempted &nbsp;·&nbsp; ${correct} correct</div>
      </div>
      <div class="sc-arrow">›</div>`;
    cont.appendChild(card);
  });
  updateStats();
}

function resetAll() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  answered = {};
  save();
  renderHome();
  updateStats();
}

function goHome() { renderHome(); }

// ════════════════════════════════════════════════════════════════
// OPEN SECTION
// ════════════════════════════════════════════════════════════════
function openSection(idx) {
  activeSec = SECTIONS[idx];
  qList = [];
  for (let i = activeSec.start; i <= activeSec.end; i++) qList.push(i);
  qPos = 0;
  mcSel = null; tfSel = null; ddPlacements = {};
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('quizView').style.display = 'block';
  document.getElementById('qnavTitle').textContent = activeSec.name;
  document.getElementById('btnPrev').style.display = 'inline-block';
  document.getElementById('btnResults').style.display = 'none';
  document.getElementById('qprogFill').style.background = activeSec.color;
  renderQ();
}

// ════════════════════════════════════════════════════════════════
// RENDER QUESTION
// ════════════════════════════════════════════════════════════════
function renderQ() {
  const qi = qList[qPos];
  const q = Q[qi];
  mcSel = null; tfSel = null; ddPlacements = {};

  const total = qList.length;
  document.getElementById('qnavCount').textContent = `${qPos+1} / ${total}`;
  document.getElementById('qprogFill').style.width = ((qPos+1)/total*100)+'%';

  const isLast = qPos === total - 1;
  document.getElementById('btnPrev').disabled = qPos === 0;
  document.getElementById('btnResults').style.display = isLast ? 'inline-block' : 'none';
  if (isLast) document.getElementById('btnResults').style.background = activeSec.color;

  const area = document.getElementById('questionArea');
  if (q.t === 'mc') renderMC(area, q, qi);
  else if (q.t === 'tf') renderTF(area, q, qi);
  else if (q.t === 'dd') renderDD(area, q, qi);
}

function prevQ() { if (qPos > 0) { qPos--; renderQ(); } }

function nextQ() {
  if (qPos + 1 < qList.length) { qPos++; renderQ(); }
  else showComplete();
}

// ════════════════════════════════════════════════════════════════
// MC
// ════════════════════════════════════════════════════════════════
function renderMC(area, q, qi) {
  const locked = answered[qi] !== undefined;
  const saved = answered[qi];
  const letters = ['A','B','C','D'];
  let resultCls = '';
  if (locked) resultCls = saved.correct ? ' correct' : ' wrong';

  const codeBlock = q.code ? `<div class="q-code">${escHtml(q.code)}</div>` : '';

  const optsHtml = q.o.map((opt,i) => {
    let cls = 'opt-btn';
    if (locked) {
      if (i === q.a) cls += ' opt-correct';
      else if (i === saved.selection && i !== q.a) cls += ' opt-wrong';
    } else if (mcSel === i) cls += ' selected';
    return `<button class="${cls}" onclick="selectMC(${qi},${i})" ${locked?'disabled':''}>
      <span class="opt-letter">${letters[i]}</span>
      <span>${escHtml(opt)}</span>
    </button>`;
  }).join('');

  area.innerHTML = `
    <div class="q-card${resultCls}" id="qcard_${qi}">
      <div class="q-num" style="color:${activeSec.color}">Q${qi+1} &nbsp;·&nbsp; Multiple Choice</div>
      <div class="q-text">${escHtml(q.q)}</div>
      ${codeBlock}
      <div class="opts">${optsHtml}</div>
      ${locked ? feedbackHtml(saved.correct, q.e) : ''}
      <div class="q-footer">
        ${!locked ? `<button class="btn-check" id="btnCheck_${qi}" onclick="checkMC(${qi})" disabled>Check answer</button>` : ''}
        ${locked ? `<button class="btn-next" onclick="nextQ()" style="background:${activeSec.color}">Next →</button>` : ''}
      </div>
    </div>`;
}

function selectMC(qi, i) {
  if (answered[qi] !== undefined) return;
  mcSel = i;
  renderMC(document.getElementById('questionArea'), Q[qi], qi);
  document.getElementById(`btnCheck_${qi}`).disabled = false;
}

function checkMC(qi) {
  const q = Q[qi];
  if (mcSel === null || answered[qi] !== undefined) return;
  const correct = mcSel === q.a;
  answered[qi] = {correct, selection: mcSel};
  save();
  renderMC(document.getElementById('questionArea'), q, qi);
  updateStats();
}

// ════════════════════════════════════════════════════════════════
// TF
// ════════════════════════════════════════════════════════════════
function renderTF(area, q, qi) {
  const locked = answered[qi] !== undefined;
  const saved = answered[qi];
  let resultCls = '';
  if (locked) resultCls = saved.correct ? ' correct' : ' wrong';

  function tfCls(val) {
    let c = 'tf-btn';
    if (locked) {
      if (val === q.a) c += ' tf-correct';
      else if (val === saved.selection && val !== q.a) c += ' tf-wrong';
    } else if (tfSel === val) c += ' selected';
    return c;
  }

  area.innerHTML = `
    <div class="q-card${resultCls}" id="qcard_${qi}">
      <div class="q-num" style="color:${activeSec.color}">Q${qi+1} &nbsp;·&nbsp; True / False</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="tf-row">
        <button id="tf_${qi}_true"  class="${tfCls(true)}"  onclick="selectTF(${qi},true)"  ${locked?'disabled':''}>✓ True</button>
        <button id="tf_${qi}_false" class="${tfCls(false)}" onclick="selectTF(${qi},false)" ${locked?'disabled':''}>✗ False</button>
      </div>
      ${locked ? feedbackHtml(saved.correct, q.e) : ''}
      <div class="q-footer">
        ${!locked ? `<button class="btn-check" id="btnCheck_${qi}" onclick="checkTF(${qi})" disabled>Check answer</button>` : ''}
        ${locked ? `<button class="btn-next" onclick="nextQ()" style="background:${activeSec.color}">Next →</button>` : ''}
      </div>
    </div>`;
}

function selectTF(qi, val) {
  if (answered[qi] !== undefined) return;
  tfSel = val;
  document.getElementById(`tf_${qi}_true`).className  = 'tf-btn' + (val === true  ? ' selected' : '');
  document.getElementById(`tf_${qi}_false`).className = 'tf-btn' + (val === false ? ' selected' : '');
  document.getElementById(`btnCheck_${qi}`).disabled = false;
}

function checkTF(qi) {
  const q = Q[qi];
  if (tfSel === null || answered[qi] !== undefined) return;
  const correct = tfSel === q.a;
  answered[qi] = {correct, selection: tfSel};
  save();
  renderTF(document.getElementById('questionArea'), q, qi);
  updateStats();
}

// ════════════════════════════════════════════════════════════════
// DRAG & DROP
// ════════════════════════════════════════════════════════════════
function renderDD(area, q, qi) {
  const locked = answered[qi] !== undefined;
  const saved = answered[qi];
  if (locked && saved.selection) ddPlacements = {...saved.selection};

  const bankItems = locked ? [] : q.items.filter(item => !ddPlacements[item]);

  function zoneItems(zone) {
    if (locked) return q.items.filter(item => (saved.selection||{})[item] === zone);
    return q.items.filter(item => ddPlacements[item] === zone);
  }

  function itemHtml(item, zone) {
    let cls = 'dd-item';
    if (locked) {
      cls += (q.ans[item] === zone) ? ' item-correct' : ' item-wrong';
    }
    return `<div class="${cls}" draggable="${!locked}"
      ondragstart="ddStart(event,'${esc(item)}')"
      ondragend="ddEnd(event)">${escHtml(item)}</div>`;
  }

  const bankHtml = bankItems.map(item => itemHtml(item, null)).join('');
  const zonesHtml = q.zones.map(zone => `
    <div class="dd-zone" id="ddz_${qi}_${esc(zone)}"
      ondragover="ddOver(event,'${esc(zone)}')"
      ondragleave="ddLeave(event,'${esc(zone)}')"
      ondrop="ddDrop(event,${qi},'${esc(zone)}')">
      <div class="dd-zone-label">${escHtml(zone)}</div>
      <div class="dd-items" id="ddi_${qi}_${esc(zone)}">${zoneItems(zone).map(item=>itemHtml(item,zone)).join('')}</div>
    </div>`).join('');

  let resultCls = '';
  if (locked) resultCls = saved.correct ? ' correct' : (saved.numCorrect>0?' partial':' wrong');

  area.innerHTML = `
    <div class="q-card${resultCls}" id="qcard_${qi}">
      <div class="q-num" style="color:${activeSec.color}">Q${qi+1} &nbsp;·&nbsp; Drag &amp; Drop</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="dd-area">
        <div class="dd-bank-wrap">
          <div class="dd-bank-label">Items to place</div>
          <div class="dd-bank" id="ddbank_${qi}"
            ondragover="ddOver(event,'__bank__')"
            ondragleave="ddLeave(event,'__bank__')"
            ondrop="ddDrop(event,${qi},'__bank__')">${bankHtml}</div>
        </div>
        <div class="dd-zones">${zonesHtml}</div>
      </div>
      ${locked ? feedbackHtml(saved.correct, q.e + (saved.correct?'':` (${saved.numCorrect}/${q.items.length} correct)`)) : ''}
      <div class="q-footer">
        ${!locked ? `<button class="btn-check" id="btnCheck_${qi}" onclick="checkDD(${qi})" disabled>Check answer</button>` : ''}
        ${locked ? `<button class="btn-next" onclick="nextQ()" style="background:${activeSec.color}">Next →</button>` : ''}
      </div>
    </div>`;
}

function ddStart(e, item) {
  ddDraggingItem = item;
  setTimeout(() => { const el = e.target; if (el) el.classList.add('dragging'); }, 0);
}
function ddEnd(e) { e.target.classList.remove('dragging'); }

function ddOver(e, zone) {
  e.preventDefault();
  const id = zone === '__bank__' ? 'ddbank_'+qList[qPos] : 'ddz_'+qList[qPos]+'_'+zone;
  const el = document.getElementById(id);
  if (el) el.classList.add('dragover');
}

function ddLeave(e, zone) {
  const id = zone === '__bank__' ? 'ddbank_'+qList[qPos] : 'ddz_'+qList[qPos]+'_'+zone;
  const el = document.getElementById(id);
  if (el) el.classList.remove('dragover');
}

function ddDrop(e, qi, zone) {
  e.preventDefault();
  if (!ddDraggingItem || answered[qi] !== undefined) return;
  delete ddPlacements[ddDraggingItem];
  if (zone !== '__bank__') ddPlacements[ddDraggingItem] = zone;
  const allPlaced = Q[qi].items.every(item => ddPlacements[item]);
  renderDD(document.getElementById('questionArea'), Q[qi], qi);
  const btn = document.getElementById(`btnCheck_${qi}`);
  if (btn) btn.disabled = !allPlaced;
  ddDraggingItem = null;
}

function checkDD(qi) {
  const q = Q[qi];
  if (answered[qi] !== undefined) return;
  let numCorrect = 0;
  q.items.forEach(item => { if (ddPlacements[item] === q.ans[item]) numCorrect++; });
  const correct = numCorrect === q.items.length;
  answered[qi] = {correct, selection:{...ddPlacements}, numCorrect, total:q.items.length};
  save();
  renderDD(document.getElementById('questionArea'), q, qi);
  updateStats();
}

// ════════════════════════════════════════════════════════════════
// COMPLETE SCREEN
// ════════════════════════════════════════════════════════════════
function showComplete() {
  const sec = activeSec;
  let correct = 0, wrong = 0;
  for (let qi = sec.start; qi <= sec.end; qi++) {
    if (answered[qi] !== undefined) { answered[qi].correct ? correct++ : wrong++; }
  }
  const total = sec.end - sec.start + 1;
  const pct = Math.round(correct/total*100);
  let headline, sub;
  if (pct>=90) { headline='Outstanding! 🎓'; sub='Excellent command of this topic!'; }
  else if (pct>=75) { headline='Great work! 💪'; sub='Solid. Review missed questions to lock it in.'; }
  else if (pct>=60) { headline='Good effort 👍'; sub='You have the foundations — revisit the tricky ones.'; }
  else { headline='Keep studying 📖'; sub='Go back through the material and try again!'; }

  document.getElementById('questionArea').innerHTML = `
    <div class="complete-card">
      <div class="score-ring">
        <div class="score-num">${correct}</div>
        <div class="score-pct">${pct}%</div>
      </div>
      <div class="complete-title">${headline}</div>
      <div class="complete-sub">${sub}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val" style="color:#16A34A">${correct}</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-box"><div class="stat-val" style="color:#DC2626">${wrong}</div><div class="stat-lbl">Wrong</div></div>
        <div class="stat-box"><div class="stat-val" style="color:#0369A1">${total-correct-wrong}</div><div class="stat-lbl">Skipped</div></div>
      </div>
      <div class="complete-btns">
        <button class="btn-retry" onclick="retrySection()">↺ Retry section</button>
        <button class="btn-home" onclick="goHome()">← All sections</button>
      </div>
    </div>`;
  document.getElementById('qnavCount').textContent = '';
  document.getElementById('btnPrev').style.display = 'none';
  document.getElementById('btnResults').style.display = 'none';
}

function retrySection() {
  const sec = activeSec;
  for (let qi = sec.start; qi <= sec.end; qi++) delete answered[qi];
  save();
  document.getElementById('btnPrev').style.display = 'inline-block';
  openSection(SECTIONS.indexOf(sec));
}

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════
function feedbackHtml(correct, exp) {
  const cls = correct ? 'correct' : 'wrong';
  const icon = correct ? '✓' : '✗';
  const label = correct ? 'Correct!' : 'Incorrect.';
  return `<div class="feedback ${cls}">${icon} <strong>${label}</strong> ${escHtml(exp)}</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
renderHome();
</script>
