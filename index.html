<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC Prep</title>
<link rel="icon" href="icon.png" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:
radial-gradient(circle at top right,#DBEAFE 0%,transparent 40%),
radial-gradient(circle at top left,#EFF6FF 0%,transparent 30%),
#F8FAFC;
color:#1E293B;
min-height:100vh
}
button{font-family:inherit}

/* HEADER */
.hdr{background:#1A2B4A;color:#fff; height: 25vh;}
.hdr-inner{max-width:680px;margin:0 auto;padding:22px 20px 16px}
.hdr-eye{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#93C5FD;margin-bottom:4px}
.hdr h1{font-size:22px;font-weight:700;margin-bottom:2px}
.hdr-sub{font-size:12px;color:#94A3B8}
.prog-track{background:rgba(255,255,255,.1);height:4px}
.prog-fill{height:4px;background:#3B82F6;transition:width .4s}
.stats-bar{border-top:1px solid rgba(255,255,255,.08)}
.stats-inner{max-width:680px;margin:0 auto;padding:10px 20px;display:flex;gap:20px;flex-wrap:wrap}
.stat{font-size:12px;color:#94A3B8;display:flex;align-items:center;gap:6px}
.stat b{font-weight:600;color:#E2E8F0}
.dot{width:7px;height:7px;border-radius:50%}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:28px 20px 60px}

/* HOME */
.home-title{font-size:18px;font-weight:700;color:#1A2B4A;margin-bottom:4px}
.home-sub{font-size:13px;color:#64748B;margin-bottom:24px}
.sec-cards{
display:flex;
flex-direction:column;
gap:18px;
width:min(900px,100%);
margin:0 auto;
}
.sec-card{
display:flex;
align-items:center;
gap:18px;
padding:24px;
border-radius:18px;
border:1px solid #E2E8F0;
background:#fff;
cursor:pointer;
text-align:left;
width:100%;
transition:all .2s ease;
box-shadow:0 2px 10px rgba(15,23,42,.05);
}

.sec-card:hover{
transform:translateY(-3px);
border-color:#2563EB;
box-shadow:0 12px 24px rgba(37,99,235,.12);
}
.sec-card:hover{box-shadow:0 2px 14px rgba(37,99,235,.1)}
.sc-icon{
width:60px;
height:60px;
border-radius:16px;
color:#fff;
font-size:26px;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-bottom:30px;
}

.dash-card{
background:#fff;
border:1px solid #E2E8F0;
border-radius:16px;
padding:18px;
text-align:center;
box-shadow:0 2px 10px rgba(15,23,42,.04);
}

.dash-number{
font-size:24px;
font-weight:700;
color:#1A2B4A;
}

.dash-label{
font-size:12px;
color:#64748B;
margin-top:4px;
}

.home-title{
font-size:28px;
font-weight:700;
color:#1A2B4A;
margin-bottom:6px;
}

.home-sub{
font-size:14px;
color:#64748B;
margin-bottom:20px;
}

.sc-title{
font-size:17px;
font-weight:700;
color:#1A2B4A;
margin-bottom:6px;
}

.sc-desc{
font-size:13px;
line-height:1.5;
color:#64748B;
}
.sc-body{flex:1;min-width:0}
.sc-title{font-size:15px;font-weight:700;color:#1A2B4A;margin-bottom:2px}
.sc-desc{font-size:12px;color:#64748B;margin-bottom:8px}
.sc-bar-track{background:#E2E8F0;border-radius:4px;height:5px;overflow:hidden}
.sc-bar-fill{height:5px;border-radius:4px;transition:width .4s}
.sc-label{font-size:11px;color:#64748B;margin-top:4px}
.sc-arrow{font-size:20px;color:#94A3B8;flex-shrink:0}
.reset-wrap{text-align:center;margin-top:28px}
.btn-reset{padding:9px 22px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#94A3B8;cursor:pointer}
.btn-reset:hover{border-color:#DC2626;color:#DC2626}

/* QUIZ NAV */
.quiz-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.btn-back{padding:7px 14px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#64748B;cursor:pointer}
.btn-back:hover{border-color:#1A2B4A;color:#1A2B4A}
.qnav-title{font-size:15px;font-weight:700;color:#1A2B4A}
.qnav-count{margin-left:auto;font-size:13px;color:#64748B}
.qprog-track{background:#E2E8F0;border-radius:4px;height:4px;margin-bottom:20px;overflow:hidden}
.qprog-fill{height:4px;border-radius:4px;transition:width .3s}

/* QUESTION CARD */
.q-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:14px;padding:24px 22px}
.q-card.correct{background:#F0FDF4;border-color:#86EFAC}
.q-card.wrong{background:#FEF2F2;border-color:#FCA5A5}
.q-card.partial{background:#FFFBEB;border-color:#FCD34D}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:20px;color:#1E293B}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid #CBD5E1;border-radius:10px;background:#F8FAFC;cursor:pointer;text-align:left;font-size:14px;color:#1E293B;width:100%;transition:border-color .12s,background .12s}
.opt-btn:not(:disabled):hover{border-color:#3B82F6;background:#EEF4FF}
.opt-letter{width:26px;height:26px;min-width:26px;border-radius:50%;background:#CBD5E1;color:#64748B;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.opt-btn:not(:disabled):hover .opt-letter{background:#3B82F6;color:#fff}
.opt-btn.selected{border-color:#2563EB;background:#EEF4FF}
.opt-btn.selected .opt-letter{background:#2563EB;color:#fff}
.opt-btn.opt-correct{border-color:#16A34A;background:#F0FDF4}
.opt-btn.opt-correct .opt-letter{background:#16A34A;color:#fff}
.opt-btn.opt-wrong{border-color:#DC2626;background:#FEF2F2}
.opt-btn.opt-wrong .opt-letter{background:#DC2626;color:#fff}

/* TF */
.tf-row{display:flex;gap:10px}
.tf-btn{flex:1;padding:13px;border:1.5px solid #CBD5E1;border-radius:10px;background:#F8FAFC;cursor:pointer;font-size:14px;font-weight:600;color:#1E293B;transition:all .12s}
.tf-btn:not(:disabled):hover{border-color:#3B82F6;background:#EEF4FF;color:#2563EB}
.tf-btn.selected{border-color:#2563EB;background:#EEF4FF;color:#2563EB}
.tf-btn.tf-correct{border-color:#16A34A;background:#F0FDF4;color:#16A34A}
.tf-btn.tf-wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626}

/* DRAG & DROP */
.dd-area{display:flex;gap:16px;flex-wrap:wrap}
.dd-bank-wrap{flex:1 1 160px;min-width:160px}
.dd-bank-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:8px}
.dd-bank{min-height:40px;padding:4px;border-radius:8px;border:1.5px dashed #CBD5E1;display:flex;flex-direction:column;gap:6px;transition:background .15s,border-color .15s}
.dd-bank.dragover{background:#EEF4FF;border-color:#3B82F6}
.dd-zones{flex:2 1 240px;display:flex;flex-direction:column;gap:8px}
.dd-zone{border:1.5px dashed #CBD5E1;border-radius:8px;padding:8px 10px;min-height:48px;transition:background .15s,border-color .15s}
.dd-zone.dragover{background:#EEF4FF;border-color:#3B82F6}
.dd-zone-label{font-size:12px;font-weight:600;color:#1A2B4A;margin-bottom:4px;pointer-events:none}
.dd-items{display:flex;flex-direction:column;gap:4px}
.dd-item{padding:7px 11px;border-radius:7px;font-size:13px;background:#fff;border:1.5px solid #CBD5E1;color:#1E293B;cursor:grab;user-select:none;transition:opacity .15s}
.dd-item.dragging{opacity:.35}
.dd-item.item-correct{border-color:#16A34A;background:#F0FDF4;color:#16A34A;cursor:default}
.dd-item.item-wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626;cursor:default}

/* FEEDBACK */
.feedback{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.5}
.feedback.correct{background:#F0FDF4;border:1px solid #86EFAC;color:#14532D}
.feedback.wrong{background:#FEF2F2;border:1px solid #FCA5A5;color:#7F1D1D}
.feedback.partial{background:#FFFBEB;border:1px solid #FCD34D;color:#78350F}

/* FOOTER BUTTONS */
.q-footer{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.btn-check{padding:10px 22px;background:#1A2B4A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-check:disabled{background:#CBD5E1;color:#94A3B8;cursor:default}
.btn-next{padding:10px 22px;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* QUIZ NAV ROW (prev/results) */
.nav-row{display:flex;justify-content:space-between;margin-top:14px}
.btn-prev{padding:8px 16px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:13px;color:#64748B;cursor:pointer}
.btn-prev:disabled{color:#CBD5E1;cursor:default}
.btn-results{padding:8px 20px;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

/* SECTION COMPLETE */
.complete-card{background:#fff;border:1.5px solid #CBD5E1;border-radius:14px;padding:40px 28px;text-align:center}
.score-ring{width:100px;height:100px;border-radius:50%;background:#EEF4FF;border:4px solid #2563EB;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
.score-num{font-size:28px;font-weight:700;color:#1A2B4A}
.score-pct{font-size:12px;color:#64748B}
.complete-title{font-size:20px;font-weight:700;color:#1A2B4A;margin-bottom:6px}
.complete-sub{font-size:14px;color:#64748B;margin-bottom:28px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.stat-box{background:#F8FAFC;border-radius:10px;padding:14px}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:12px;color:#64748B;margin-top:2px}
.complete-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-retry{padding:11px 22px;background:transparent;border:1.5px solid #CBD5E1;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:#64748B}
.btn-home{padding:11px 22px;background:#1A2B4A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* VIEWS */
#quizView{display:none}

@media(max-width:560px){
  .dd-area{flex-direction:column}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stats-inner{gap:12px}
}
</style>

<body>
<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-eye">BC STUDY PORTAL</div>
    <h1>Bachelor of Computing</h1>
    <div class="hdr-sub">
      Semester 1 Revision Hub • Practice Quizzes • Progress Tracking
    </div>
  </div>

  <div class="dashboard">
    <div class="dash-card">
        <div class="dash-number">4</div>
        <div class="dash-label">Modules</div>
    </div>

    <div class="dash-card">
        <div class="dash-number">400+</div>
        <div class="dash-label">Questions</div>
    </div>

    <div class="dash-card">
        <div class="dash-number">∞</div>
        <div class="dash-label">Practice Attempts</div>
    </div>
   </div>



  </div>
</div>

<div class="main">
  <!-- HOME -->
  <div id="homeView">
    <div class="home-title">Choose a section</div>
    <div class="sec-cards" id="secCards"></div>

  </div>

  <!-- QUIZ -->
  <div id="quizView">
    <div class="quiz-nav">
      <button class="btn-back" onclick="goHome()">← Back</button>
      <div class="qnav-title" id="qnavTitle"></div>
      <div class="qnav-count" id="qnavCount"></div>
    </div>
    <div class="qprog-track"><div class="qprog-fill" id="qprogFill" style="width:0%"></div></div>
    <div id="questionArea"></div>
    <div class="nav-row">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">← Previous</button>
      <button class="btn-results" id="btnResults" style="display:none" onclick="showComplete()">See results →</button>
    </div>
  </div>
</div>

<div class="sec-cards" id="secCards">

  <button class="sec-card"
          onclick="window.location.href='DHW281.html'"    
          style="border-color: rgb(203, 213, 225); background: rgb(255, 255, 255);">
    <div class="sc-icon" style="background:#2563EB">📊</div>
    <div class="sc-body">
      <div class="sc-title">Data Warehousing 281</div>
    </div>
    <div class="sc-arrow">›</div>
  </button>

  <button class="sec-card"
          onclick="window.location.href='DBD281.html'"
          style="border-color: rgb(203, 213, 225); background: rgb(255, 255, 255);">
    <div class="sc-icon" style="background:#7C3AED">🛢️</div>
    <div class="sc-body">
      <div class="sc-title">Database Design 281</div>
    </div>
    <div class="sc-arrow">›</div>
  </button>

  <button class="sec-card"
          onclick="window.location.href='WPR281.html'"
          style="border-color: rgb(203, 213, 225); background: rgb(255, 255, 255);">
    <div class="sc-icon" style="background:#0EA5E9">🌐</div>
    <div class="sc-body">
      <div class="sc-title">Web Programming 281</div>
    </div>
    <div class="sc-arrow">›</div>
  </button>

  <button class="sec-card"
          onclick="window.location.href='PMM281.html'"
          style="border-color: rgb(203, 213, 225); background: rgb(255, 255, 255);">
    <div class="sc-icon" style="background:#F59E0B">📅</div>
    <div class="sc-body">
      <div class="sc-title">Project Management 281</div>
    </div>
    <div class="sc-arrow">›</div>
  </button>

</div>
</body>
</html>
